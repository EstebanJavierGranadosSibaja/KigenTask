services:
  db:
    image: postgres:16-alpine
    container_name: kigen-task-db
    environment:
      POSTGRES_DB: kigentask
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./back/KigenTaskDB.sql:/docker-entrypoint-initdb.d/01-kigentask.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kigentask"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: kigen-task-api
    environment:
      DB_URL: jdbc:postgresql://db:5432/kigentask
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SERVER_PORT: 8080
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_TOKEN_INFO_URL: ${GOOGLE_TOKEN_INFO_URL:-https://oauth2.googleapis.com/tokeninfo}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api/v1}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    container_name: kigen-task-front
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data: