spring:
  application:
    name: kigen-task-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/kigentask}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      "[hibernate.format_sql]": true

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:S2lnZW5UYXNrLUphdmEtU3ByaW5nLUJvb3QtSldULVNlY3JldC1LZXktTWluaW11bS0zMi1CeXRlcw==}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    "[org.springframework.security]": INFO